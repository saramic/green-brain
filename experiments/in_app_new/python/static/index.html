<!DOCTYPE html>
<html>
<head>
  <title>GreenBrain</title>
  <style>
    body  { font-family: sans-serif; max-width: 420px; margin: 3rem auto; text-align: center; }
    h1    { color: #2e7d32; }
    .tick { font-size: 2rem; margin: 1rem 0; }
    button { padding: 1rem 3rem; font-size: 1.2rem; margin: 0.5rem;
             border: none; border-radius: 8px; cursor: pointer; color: white; }
    #btn-on  { background: #4caf50; }
    #btn-off { background: #e53935; }
  </style>
</head>
<body>
  <h1>🪴 GreenBrain 🌿🧠</h1>
  <div class="tick">Tick: <span id="tick">…</span></div>
  <div>LED: <strong id="led">…</strong></div>
  <br>
  <button id="btn-on"  onclick="led('ON')">ON</button>
  <button id="btn-off" onclick="led('OFF')">OFF</button>
  <script>
    async function led(state) {
      const r = await fetch('/led', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({state})
      });
      const d = await r.json();
      document.getElementById('led').textContent = d.led;
    }
    async function poll() {
      const r = await fetch('/status');
      const d = await r.json();
      document.getElementById('tick').textContent = d.tick;
      document.getElementById('led').textContent  = d.led;
    }
    setInterval(poll, 2000);
    poll();
  </script>
</body>
</html>
